name: ASH Image Security Scan

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ 'main', ash ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ASH security scan
        id: ash
        uses: aws-actions/automated-security-helper-action@v2
        with:
          source-directory: .
          ash-mode: container
          scanners: grype,syft
          fail-on-findings: false
          severity-threshold: medium
          output-format: both
          upload-sarif: true
          sarif-category: ash-grype-scan
          upload-artifacts: true
          artifact-retention-days: 30
          pr-comment: false

      - name: Output ASH summary
        if: always()
        run: |
          echo "ASH findings: ${{ steps.ash.outputs.findings-count }}"
          echo "Critical: ${{ steps.ash.outputs.critical-findings }}"
          echo "High: ${{ steps.ash.outputs.high-findings }}"