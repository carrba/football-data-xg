name: Ash Grype Scan & Syft SBOM

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t football-data-xg:latest -f src/Dockerfile src
      
      - name: Grype Scan
        uses: anchore/scan-action@v7
        with:
          image: football-data-xg:latest
          fail-build: false
          output-format: sarif
          output-file: grype-results.sarif
      
      - name: Upload Grype SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: grype-scan
      
      - name: Output Grype Report to stdout
        if: always()
        run: |
          echo "=== Grype Vulnerability Report ==="
          jq '.runs[0].results[] | {ruleId: .ruleId, level: .level, message: .message.text}' grype-results.sarif
      
      - name: Generate Syft SBOM
        uses: anchore/sbom-action@v0
        with:
          image: football-data-xg:latest
          format: spdx-json
          output-file: syft-sbom.spdx.json
      
      - name: Upload Grype Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-report
          path: grype-results.sarif
      
      - name: Upload Syft SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syft-sbom
          path: syft-sbom.spdx.json