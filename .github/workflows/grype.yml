name: Grype Docker Image Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t football-data-xg:latest -f src/Dockerfile src

      - name: Run Grype scan
        uses: anchore/scan-action@v3
        id: grype
        with:
          image: football-data-xg:latest
          fail-build: false
          output-file: grype-results.sarif
          output-format: sarif

      - name: Validate SARIF JSON
        run: jq empty grype-results.sarif

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif
