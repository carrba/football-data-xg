name: Software Bill of Materials

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t football-data-xg:latest -f src/Dockerfile src

      - name: Run Syft scan
        uses: anchore/sbom-action@v0
        with:
          image: football-data-xg:latest
          format: json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Display SBOM components
        run: cat sbom.json | jq '.' || syft . -o table
