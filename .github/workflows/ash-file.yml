name: Ash OpenGrep Scan

on:
  push:
    branches: [ main, sbom ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ash-opengrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Ash OpenGrep scan
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: true
          soft_fail: true
