name: AWS ASH - Grype Scan and Syft SBOM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run AWS ASH Grype Scan
        uses: aws-prototyping-sdk/aws-ash-oss-repos-grype-action@main
        with:
          gryp-version: latest
          fail-build: true
          output-file: grype-report.json
      
      - name: Generate Syft SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: syft-sbom.spdx.json
      
      - name: Upload Grype Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: grype-scan-report
          path: grype-report.json
      
      - name: Upload Syft SBOM
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: syft-sbom
          path: syft-sbom.spdx.json